name: Daily Scraper Pipeline

on:
  # Run every day at 12:00 AM UTC
  schedule:
    - cron: '0 0 * * *'
  
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  run-scrapers:
    name: Run All Scrapers
    uses: ./.github/workflows/scraper.yml
    secrets: inherit
  
  update-status:
    name: Update Status File
    needs: run-scrapers
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Determine overall status
        id: status
        run: |
          PROPERTIES_STATUS="${{ needs.run-scrapers.outputs.properties_status }}"
          OFFICES_STATUS="${{ needs.run-scrapers.outputs.offices_status }}"
          
          echo "Properties status: $PROPERTIES_STATUS"
          echo "Offices status: $OFFICES_STATUS"
          
          # Determine overall status
          if [[ "$PROPERTIES_STATUS" == "success" && "$OFFICES_STATUS" == "success" ]]; then
            OVERALL_STATUS="success"
          else
            OVERALL_STATUS="failed"
          fi
          
          echo "overall_status=$OVERALL_STATUS" >> $GITHUB_OUTPUT
          echo "properties_status=$PROPERTIES_STATUS" >> $GITHUB_OUTPUT
          echo "offices_status=$OFFICES_STATUS" >> $GITHUB_OUTPUT
      
      - name: Create status.json
        run: |
          cat > status.json << EOF
          {
            "date": "$(date -u +"%Y-%m-%d %H:%M:%S UTC")",
            "timestamp": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "overall_status": "${{ steps.status.outputs.overall_status }}",
            "workflows": {
              "properties": {
                "status": "${{ steps.status.outputs.properties_status }}",
                "workflow": "scraper.yml"
              },
              "offices": {
                "status": "${{ steps.status.outputs.offices_status }}",
                "workflow": "scraper.yml"
              }
            },
            "pipeline_run_id": "${{ github.run_id }}",
            "pipeline_run_number": "${{ github.run_number }}"
          }
          EOF
          
          cat status.json
      
      - name: Commit and push status.json
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add status.json
          git commit -m "Update status.json - ${{ steps.status.outputs.overall_status }} ($(date -u +"%Y-%m-%d %H:%M UTC"))" || echo "No changes to commit"
          git push
      
      - name: Upload status as artifact
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-status
          path: status.json
          retention-days: 30
