name: Daily Scraper

on:
  # Run every day at 12:00 AM UTC
  schedule:
    - cron: '0 0 * * *'
  
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:
  
  # Allow being called from another workflow
  workflow_call:
    outputs:
      properties_status:
        description: 'Status of properties scraper'
        value: ${{ jobs.scrape-properties.outputs.status }}
      offices_status:
        description: 'Status of offices scraper'
        value: ${{ jobs.scrape-offices.outputs.status }}

jobs:
  scrape-properties:
    name: Scrape Properties
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.run_scraper.outcome }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
      
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: |
          playwright install chromium
      
      - name: Install Playwright system dependencies
        run: |
          playwright install-deps chromium
      
      - name: Run properties scraper
        id: run_scraper
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          cd properties && python main_s3.py
      
      - name: Upload summary
        if: always()
        run: |
          echo "Properties scraper completed at $(date)"
          echo "Status: ${{ steps.run_scraper.outcome }}"
  
  scrape-offices:
    name: Scrape Offices
    runs-on: ubuntu-latest
    needs: scrape-properties
    outputs:
      status: ${{ steps.run_scraper.outcome }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
      
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: |
          playwright install chromium
      
      - name: Install Playwright system dependencies
        run: |
          playwright install-deps chromium
      
      - name: Run offices scraper
        id: run_scraper
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          cd offices && python main_offices_s3.py
      
      - name: Upload summary
        if: always()
        run: |
          echo "Offices scraper completed at $(date)"
          echo "Status: ${{ steps.run_scraper.outcome }}"

